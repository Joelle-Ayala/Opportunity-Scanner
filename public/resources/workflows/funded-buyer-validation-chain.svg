<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d"><title id="t">Illustrative funded-buyer validation chain</title><desc id="d">An award record passes through recipient, purpose, need, and route validation before outreach.</desc><rect width="1200" height="675" fill="#f4f7f6"/><text x="64" y="74" font-family="Arial" font-size="34" font-weight="700" fill="#14213d">An award is evidence, not buying intent</text><text x="64" y="110" font-family="Arial" font-size="19" fill="#52606d">Illustrative validation chain. Each step can stop or redirect the row.</text><g font-family="Arial"><g fill="#fff" stroke="#0e7c86" stroke-width="3"><rect x="55" y="230" width="190" height="150" rx="7"/><rect x="280" y="230" width="190" height="150" rx="7"/><rect x="505" y="230" width="190" height="150" rx="7"/><rect x="730" y="230" width="190" height="150" rx="7"/><rect x="955" y="230" width="190" height="150" rx="7"/></g><g fill="#14213d" font-size="22" font-weight="700" text-anchor="middle"><text x="150" y="278">Official award</text><text x="375" y="278">Recipient</text><text x="600" y="278">Funded purpose</text><text x="825" y="278">Downstream need</text><text x="1050" y="278">Valid route</text></g><g fill="#52606d" font-size="17" text-anchor="middle"><text x="150" y="320">Type, date, amount,</text><text x="150" y="344">agency, identifier</text><text x="375" y="320">Legal entity, parent,</text><text x="375" y="344">role, geography</text><text x="600" y="320">Program, timing,</text><text x="600" y="344">performance period</text><text x="825" y="320">Commercial hypothesis</text><text x="825" y="344">to verify</text><text x="1050" y="320">Procurement, partner,</text><text x="1050" y="344">supplier, or monitor</text></g><g stroke="#2e9d70" stroke-width="5"><path d="M245 305h30M470 305h30M695 305h30M920 305h30"/></g><rect x="330" y="470" width="540" height="92" rx="7" fill="#14213d"/><text x="600" y="510" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">Only then: motion + contact path + owned action</text><text x="600" y="541" text-anchor="middle" fill="#e9f4f3" font-family="Arial" font-size="17">No current budget, response, meeting, or revenue result is assumed.</text></g></svg>
