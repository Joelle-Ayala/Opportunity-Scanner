<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d"><title id="t">Illustrative sample-report trust chain</title><desc id="d">Verified evidence and explicit labels lead to a useful sample, relevant outreach, and a prospect-specific scan.</desc><rect width="1200" height="675" fill="#f4f7f6"/><text x="64" y="74" font-family="Arial" font-size="34" font-weight="700" fill="#14213d">A sample should demonstrate method, not results</text><text x="64" y="110" font-family="Arial" font-size="19" fill="#52606d">Illustrative trust chain. No response, conversion, or revenue outcome is claimed.</text><g font-family="Arial"><g fill="#fff" stroke="#0e7c86" stroke-width="3"><rect x="65" y="225" width="235" height="170" rx="7"/><rect x="345" y="225" width="235" height="170" rx="7"/><rect x="625" y="225" width="235" height="170" rx="7"/><rect x="905" y="225" width="235" height="170" rx="7"/></g><g fill="#14213d" font-size="22" font-weight="700" text-anchor="middle"><text x="182" y="273">Verified evidence</text><text x="462" y="273">Truthful sample</text><text x="742" y="273">Relevant outreach</text><text x="1022" y="273">Company scan</text></g><g fill="#52606d" font-size="17" text-anchor="middle"><text x="182" y="316">Official links, dates,</text><text x="182" y="340">status, caveats</text><text x="462" y="316">Fiction labeled;</text><text x="462" y="340">actions illustrative</text><text x="742" y="316">Accurate context,</text><text x="742" y="340">identity, opt-out</text><text x="1022" y="316">Actual offers and</text><text x="1022" y="340">qualified rows</text></g><g stroke="#2e9d70" stroke-width="5"><path d="M300 310h40M580 310h40M860 310h40"/></g><rect x="260" y="480" width="680" height="82" rx="7" fill="#14213d"/><text x="600" y="517" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Never invent customers, contacts, testimonials, rates, or outcomes</text><text x="600" y="546" text-anchor="middle" fill="#e9f4f3" font-size="17">The sample proves the structure and reasoning only.</text></g></svg>
