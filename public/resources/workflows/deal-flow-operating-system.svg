<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d"><title id="t">Illustrative public-sector deal-flow operating system</title><desc id="d">Five source lanes pass through qualification into a revenue motion, contact path, and owned action.</desc><rect width="1200" height="675" fill="#f4f7f6"/><text x="64" y="74" font-family="Arial" font-size="34" font-weight="700" fill="#14213d">Public-sector deal flow is a qualification system</text><text x="64" y="110" font-family="Arial" font-size="19" fill="#52606d">Illustrative framework. Source volume alone is not pipeline.</text><g font-family="Arial"><g fill="#fff" stroke="#0e7c86" stroke-width="3"><rect x="64" y="160" width="230" height="62" rx="6"/><rect x="64" y="240" width="230" height="62" rx="6"/><rect x="64" y="320" width="230" height="62" rx="6"/><rect x="64" y="400" width="230" height="62" rx="6"/><rect x="64" y="480" width="230" height="62" rx="6"/></g><g fill="#14213d" font-size="20" font-weight="700"><text x="88" y="198">Active notices</text><text x="88" y="278">Historical spending</text><text x="88" y="358">Funding + recipients</text><text x="88" y="438">Forecasts</text><text x="88" y="518">Policy signals</text></g><path d="M320 351h90" stroke="#8795a1" stroke-width="5"/><path d="m398 339 16 12-16 12" fill="none" stroke="#8795a1" stroke-width="5"/><rect x="430" y="205" width="285" height="292" rx="8" fill="#14213d"/><text x="468" y="253" fill="#fff" font-size="25" font-weight="700">Qualification gate</text><g fill="#e9f4f3" font-size="20"><text x="468" y="307">Fit + capacity</text><text x="468" y="351">Status + timing</text><text x="468" y="395">Eligibility</text><text x="468" y="439">Credible target + route</text></g><path d="M740 351h74" stroke="#0e7c86" stroke-width="5"/><path d="m802 339 16 12-16 12" fill="none" stroke="#0e7c86" stroke-width="5"/><g fill="#fff" stroke="#2e9d70" stroke-width="3"><rect x="838" y="180" width="298" height="92" rx="7"/><rect x="838" y="300" width="298" height="92" rx="7"/><rect x="838" y="420" width="298" height="92" rx="7"/></g><g fill="#14213d" font-size="22" font-weight="700"><text x="870" y="235">Revenue motion</text><text x="870" y="355">Official contact path</text><text x="870" y="475">Owner + next action</text></g></g></svg>
