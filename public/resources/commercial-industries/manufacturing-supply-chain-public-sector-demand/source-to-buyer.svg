<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Manufacturing source-to-buyer map</title>
  <desc id="desc">Illustrative map from manufacturing evidence through supplier qualification to commercial routes.</desc>
  <rect width="1200" height="675" fill="#faf9f6"/>
  <text x="70" y="75" fill="#312f2b" font-family="Arial, sans-serif" font-size="34" font-weight="700">Manufacturing source-to-buyer map</text>
  <text x="70" y="112" fill="#68635b" font-family="Arial, sans-serif" font-size="17">Illustrative framework. Ecosystem and workforce records are context until a buyer route is verified.</text>
  <g font-family="Arial, sans-serif">
    <text x="70" y="170" fill="#9a5c26" font-size="16" font-weight="700">SOURCE LANE</text>
    <rect x="70" y="195" width="270" height="58" rx="6" fill="#fff" stroke="#c7a989"/><text x="92" y="231" fill="#4b3626" font-size="18">Active procurement</text>
    <rect x="70" y="267" width="270" height="58" rx="6" fill="#fff" stroke="#c7a989"/><text x="92" y="303" fill="#4b3626" font-size="18">Prime / award history</text>
    <rect x="70" y="339" width="270" height="58" rx="6" fill="#fff" stroke="#c7a989"/><text x="92" y="375" fill="#4b3626" font-size="18">Industrial recipient</text>
    <rect x="70" y="411" width="270" height="58" rx="6" fill="#fff" stroke="#c7a989"/><text x="92" y="447" fill="#4b3626" font-size="18">MEP / workforce context</text>
    <path d="M365 332H430" stroke="#9a5c26" stroke-width="4"/><path d="m430 332-14-9v18z" fill="#9a5c26"/>
    <text x="440" y="170" fill="#9a5c26" font-size="16" font-weight="700">SUPPLIER FIT</text>
    <rect x="440" y="195" width="315" height="274" rx="8" fill="#f5ede3" stroke="#bd9570"/>
    <text x="468" y="239" fill="#4b3626" font-size="19" font-weight="700">Specification + process</text>
    <text x="468" y="281" fill="#4b3626" font-size="18">Capacity + delivery</text>
    <text x="468" y="323" fill="#4b3626" font-size="18">Quality + traceability</text>
    <text x="468" y="365" fill="#4b3626" font-size="18">Cyber + domestic source</text>
    <text x="468" y="407" fill="#4b3626" font-size="18">Onboarding + route</text>
    <path d="M780 332H845" stroke="#9a5c26" stroke-width="4"/><path d="m845 332-14-9v18z" fill="#9a5c26"/>
    <text x="855" y="170" fill="#9a5c26" font-size="16" font-weight="700">TARGET</text>
    <rect x="855" y="195" width="275" height="58" rx="6" fill="#624329"/><text x="877" y="231" fill="#fff" font-size="18">Agency buyer</text>
    <rect x="855" y="267" width="275" height="58" rx="6" fill="#624329"/><text x="877" y="303" fill="#fff" font-size="18">Prime / distributor</text>
    <rect x="855" y="339" width="275" height="58" rx="6" fill="#624329"/><text x="877" y="375" fill="#fff" font-size="18">Funded manufacturer</text>
    <rect x="855" y="411" width="275" height="58" rx="6" fill="#624329"/><text x="877" y="447" fill="#fff" font-size="18">Partner / research</text>
    <rect x="70" y="535" width="1060" height="78" rx="6" fill="#fff" stroke="#ddd2c5"/>
    <text x="95" y="571" fill="#4b3626" font-size="18" font-weight="700">Qualification first:</text><text x="255" y="571" fill="#665b51" font-size="18">a relevant product keyword does not prove technical, supplier, or delivery readiness.</text>
    <text x="95" y="599" fill="#665b51" font-size="17">Document the source, target, motion, official route, next action, and disqualifier.</text>
  </g>
</svg>
