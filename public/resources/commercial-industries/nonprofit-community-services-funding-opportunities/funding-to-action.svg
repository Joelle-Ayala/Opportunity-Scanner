<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Community-services funding-to-action map</title>
  <desc id="desc">Illustrative map separating applications, procurements, recipients, partnerships, and monitoring.</desc>
  <rect width="1200" height="675" fill="#f8f8fa"/>
  <text x="70" y="75" fill="#292d3c" font-family="Arial, sans-serif" font-size="34" font-weight="700">Community-services funding-to-action map</text>
  <text x="70" y="112" fill="#626777" font-family="Arial, sans-serif" font-size="17">Illustrative framework. The current notice controls eligibility; the award record controls recipient claims.</text>
  <g font-family="Arial, sans-serif">
    <text x="70" y="170" fill="#5d5fa7" font-size="16" font-weight="700">OFFICIAL RECORD</text>
    <rect x="70" y="195" width="275" height="58" rx="6" fill="#fff" stroke="#afb0d2"/><text x="92" y="231" fill="#34365d" font-size="18">Funding opportunity</text>
    <rect x="70" y="267" width="275" height="58" rx="6" fill="#fff" stroke="#afb0d2"/><text x="92" y="303" fill="#34365d" font-size="18">Agency procurement</text>
    <rect x="70" y="339" width="275" height="58" rx="6" fill="#fff" stroke="#afb0d2"/><text x="92" y="375" fill="#34365d" font-size="18">Official award / recipient</text>
    <rect x="70" y="411" width="275" height="58" rx="6" fill="#fff" stroke="#afb0d2"/><text x="92" y="447" fill="#34365d" font-size="18">Program / policy history</text>
    <path d="M370 332H435" stroke="#5d5fa7" stroke-width="4"/><path d="m435 332-14-9v18z" fill="#5d5fa7"/>
    <text x="445" y="170" fill="#5d5fa7" font-size="16" font-weight="700">VERIFY</text>
    <rect x="445" y="195" width="310" height="274" rx="8" fill="#eeeeF8" stroke="#999bc4"/>
    <text x="473" y="239" fill="#34365d" font-size="19" font-weight="700">Status + eligibility</text>
    <text x="473" y="281" fill="#34365d" font-size="18">Applicant / recipient</text>
    <text x="473" y="323" fill="#34365d" font-size="18">Allowable delivery need</text>
    <text x="473" y="365" fill="#34365d" font-size="18">Capacity + compliance</text>
    <text x="473" y="407" fill="#34365d" font-size="18">Official contact route</text>
    <path d="M780 332H845" stroke="#5d5fa7" stroke-width="4"/><path d="m845 332-14-9v18z" fill="#5d5fa7"/>
    <text x="855" y="170" fill="#5d5fa7" font-size="16" font-weight="700">REVENUE MOTION</text>
    <rect x="855" y="195" width="275" height="58" rx="6" fill="#45477d"/><text x="877" y="231" fill="#fff" font-size="18">Direct apply</text>
    <rect x="855" y="267" width="275" height="58" rx="6" fill="#45477d"/><text x="877" y="303" fill="#fff" font-size="18">Sell to agency</text>
    <rect x="855" y="339" width="275" height="58" rx="6" fill="#45477d"/><text x="877" y="375" fill="#fff" font-size="18">Funded buyer / partner</text>
    <rect x="855" y="411" width="275" height="58" rx="6" fill="#45477d"/><text x="877" y="447" fill="#fff" font-size="18">Monitor / research</text>
    <rect x="70" y="535" width="1060" height="78" rx="6" fill="#fff" stroke="#d5d5e2"/>
    <text x="95" y="571" fill="#34365d" font-size="18" font-weight="700">Do not collapse:</text><text x="245" y="571" fill="#5f6074" font-size="18">applicant, recipient, buyer, partner, and program office are different roles.</text>
    <text x="95" y="599" fill="#5f6074" font-size="17">Each retained row needs a verified organization, source-backed route, owner, and next action.</text>
  </g>
</svg>
