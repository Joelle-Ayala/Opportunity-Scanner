<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">What each public source adds beyond SAM.gov</title>
  <desc id="desc">Comparison table of six official public-sector source lanes.</desc>
  <rect width="1200" height="720" fill="#f7f8f5"/>
  <text x="72" y="70" fill="#17211b" font-family="Arial, sans-serif" font-size="34" font-weight="700">What each source adds beyond SAM.gov</text>
  <text x="72" y="104" fill="#53605a" font-family="Arial, sans-serif" font-size="17">Use more sources only when they improve classification, targeting, or next action.</text>
  <g font-family="Arial, sans-serif">
    <rect x="72" y="142" width="1056" height="52" fill="#17211b"/>
    <text x="94" y="175" fill="#ffffff" font-size="16" font-weight="700">SOURCE LANE</text>
    <text x="360" y="175" fill="#ffffff" font-size="16" font-weight="700">ADDS</text>
    <text x="780" y="175" fill="#ffffff" font-size="16" font-weight="700">TYPICAL ACTION</text>
    <g font-size="16">
      <rect x="72" y="194" width="1056" height="70" fill="#e0f2eb"/>
      <text x="94" y="235" fill="#123f32" font-weight="700">SAM.gov</text><text x="360" y="235" fill="#17211b">Federal notices and response instructions</text><text x="780" y="235" fill="#17211b">Qualify notice and route</text>
      <rect x="72" y="264" width="1056" height="70" fill="#ffffff"/>
      <text x="94" y="305" fill="#123f32" font-weight="700">USAspending</text><text x="360" y="305" fill="#17211b">Historical buyers, awards, recipients</text><text x="780" y="305" fill="#17211b">Research pattern and target</text>
      <rect x="72" y="334" width="1056" height="70" fill="#f4e7bd"/>
      <text x="94" y="375" fill="#6a5115" font-weight="700">Grants.gov</text><text x="360" y="375" fill="#17211b">Funding status and applicant eligibility</text><text x="780" y="375" fill="#17211b">Apply or monitor recipients</text>
      <rect x="72" y="404" width="1056" height="70" fill="#e4eef2"/>
      <text x="94" y="445" fill="#33444b" font-weight="700">Forecasts</text><text x="360" y="445" fill="#17211b">Anticipated agency requirements</text><text x="780" y="445" fill="#17211b">Prepare and schedule review</text>
      <rect x="72" y="474" width="1056" height="70" fill="#ffffff"/>
      <text x="94" y="515" fill="#123f32" font-weight="700">Policy sources</text><text x="360" y="515" fill="#17211b">Rules, notices, program direction</text><text x="780" y="515" fill="#17211b">Monitor implementation</text>
      <rect x="72" y="544" width="1056" height="70" fill="#ece9df"/>
      <text x="94" y="585" fill="#4f4a3f" font-weight="700">State/local portals</text><text x="360" y="585" fill="#17211b">Nonfederal, geography-specific demand</text><text x="780" y="585" fill="#17211b">Follow native process</text>
    </g>
  </g>
  <text x="72" y="666" fill="#53605a" font-family="Arial, sans-serif" font-size="15">Illustrative framework. It does not represent measured source coverage or opportunity volume.</text>
</svg>
