name: Launch Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: launch-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MIGRATION_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify immutable migration history
        run: node scripts/test-migration-manifest.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify launch release
        run: pnpm run verify:launch
